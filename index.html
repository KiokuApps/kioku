<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kioku</title>
  <meta name="description" content="Kioku KPSS Tarih — Aralıklı tekrar sistemiyle sınavda başarıya ulaş." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #F9F1DD;
      --ink:    #1a2a4a;
      --muted:  #9a8f7a;
      --border: #ddd3b4;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 64px;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      animation: up 0.55s ease both;
    }
    .app-icon {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(26,42,74,0.12);
    }
    .app-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      text-align: center;
      line-height: 1.7;
      max-width: 230px;
    }
    .links {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .play-link {
      display: block;
      text-decoration: none;
      animation: up 0.55s 0.1s ease both;
      transition: transform 0.16s ease, opacity 0.16s ease;
    }
    .play-link:hover { transform: translateY(-2px); opacity: 0.88; }
    .play-link:active { transform: scale(0.97); }
    .play-link img {
      display: block;
      height: 64px;
      width: auto;
      margin: 0 auto;
    }
    footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: up 0.55s 0.3s ease both;
    }
    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
