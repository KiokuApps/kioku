<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kioku</title>
  <meta name="description" content="Kioku KPSS Tarih — Aralıklı tekrar sistemiyle sınavda başarıya ulaş." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:   #F9F1DD;
      --ink:  #1a2a4a;
      --muted:#9a8f7a;
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 64px;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      animation: up 0.55s ease both;
    }
    .brand-icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .brand-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .brand {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      color: var(--ink);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .tagline {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      text-align: center;
      line-height: 1.7;
      max-width: 230px;
    }
    .links { width: 100%; max-width: 360px; }
    .play-btn {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--ink);
      border-radius: 16px;
      padding: 14px 20px;
      text-decoration: none;
      color: var(--bg);
      animation: up 0.55s 0.12s ease both;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }
    .play-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(26,42,74,0.22);
    }
    .play-btn:active { transform: scale(0.97); }
    .play-app-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
    }
    .play-app-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .play-text { flex: 1; }
    .play-label { font-size: 11px; opacity: 0.5; margin-bottom: 3px; }
    .play-title {
      font-family: 'DM Serif Display', serif;
      font-size: 17px;
      line-height: 1.2;
    }
    .play-sub { font-size: 11px; opacity: 0.4; margin-top: 2px; }
    .gplay-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: block;
    }
    footer {
      margin-top: auto;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: up 0.55s 0.3s ease both;
    }
    @keyframes up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (hover: none) {
      .play-btn:hover { transform: none; box-shadow: none; }
    }
  </style>
</head>
